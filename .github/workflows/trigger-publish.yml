# Trigger publish pipeline in Powershell-Module-Automation repo
# On push to main, sends repository_dispatch so the automation repo runs Publish PowerShell Module
# Requires: repo secret AUTOMATION_TRIGGER_TOKEN, repo variable AUTOMATION_REPO = royklo/Powershell-Module-Automation
name: Trigger Publish

on:
  push:
    branches: [ main, master ]

jobs:
  notify:
    name: Notify automation repo
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish workflow
        run: |
          AUTOMATION_REPO="${{ vars.AUTOMATION_REPO }}"
          if [ -z "$AUTOMATION_REPO" ]; then AUTOMATION_REPO="royklo/Powershell-Module-Automation"; fi
          REPO="${{ github.repository }}"
          REF="${{ github.ref_name }}"
          curl -sS -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.AUTOMATION_TRIGGER_TOKEN }}" \
            "https://api.github.com/repos/${AUTOMATION_REPO}/dispatches" \
            -d "{\"event_type\":\"publish_module\",\"client_payload\":{\"repository\":\"${REPO}\",\"ref\":\"${REF}\"}}"
